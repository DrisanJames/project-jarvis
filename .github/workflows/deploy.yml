name: Build & Deploy to ECS

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  AWS_REGION: us-west-2
  ECR_REPOSITORY: ignite-upside-down
  ECS_CLUSTER: apex-cluster
  ECS_SERVICE: ignite-service
  TASK_FAMILY: ignite-upside-down
  CONTAINER_NAME: ignite-server
  PUBLIC_BASE_URL: https://projectjarvis.io

permissions:
  id-token: write
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set build metadata
        id: build-meta
        run: |
          echo "build_time=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> $GITHUB_OUTPUT

      - name: Build, push, and resolve immutable image
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
          BUILD_TIME: ${{ steps.build-meta.outputs.build_time }}
        run: |
          IMAGE_TAG_URI="$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"
          docker build \
            --build-arg VERSION="$IMAGE_TAG" \
            --build-arg GIT_SHA="$IMAGE_TAG" \
            --build-arg BUILD_TIME="$BUILD_TIME" \
            --build-arg IMAGE_URI="$IMAGE_TAG_URI" \
            -t "$IMAGE_TAG_URI" .
          docker push "$IMAGE_TAG_URI"
          IMAGE_DIGEST=$(aws ecr describe-images \
            --repository-name "$ECR_REPOSITORY" \
            --image-ids imageTag="$IMAGE_TAG" \
            --query 'imageDetails[0].imageDigest' \
            --output text)
          IMAGE_URI="$ECR_REGISTRY/$ECR_REPOSITORY@$IMAGE_DIGEST"
          echo "image_uri=$IMAGE_URI" >> $GITHUB_OUTPUT
          echo "image_digest=$IMAGE_DIGEST" >> $GITHUB_OUTPUT
          echo "image_tag=$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: Prepare task definition payload
        id: task-def-payload
        env:
          IMAGE_URI: ${{ steps.build-image.outputs.image_uri }}
          IMAGE_DIGEST: ${{ steps.build-image.outputs.image_digest }}
          IMAGE_TAG: ${{ steps.build-image.outputs.image_tag }}
          BUILD_TIME: ${{ steps.build-meta.outputs.build_time }}
        run: |
          CURRENT_TASK_DEF=$(aws ecs describe-services \
            --cluster "$ECS_CLUSTER" \
            --services "$ECS_SERVICE" \
            --query 'services[0].taskDefinition' \
            --output text 2>/dev/null || true)
          if [ -z "$CURRENT_TASK_DEF" ] || [ "$CURRENT_TASK_DEF" = "None" ]; then
            CURRENT_TASK_DEF=$(aws ecs describe-task-definition \
              --task-definition "$TASK_FAMILY" \
              --query 'taskDefinition.taskDefinitionArn' \
              --output text)
          fi
          aws ecs describe-task-definition --task-definition "$CURRENT_TASK_DEF" > current-task-def.json
          python3 deploy/prepare_task_definition.py \
            current-task-def.json \
            task-def.json \
            "$CONTAINER_NAME" \
            "$IMAGE_URI" \
            "$IMAGE_TAG" \
            "$BUILD_TIME" \
            "$IMAGE_DIGEST"

      - name: Register new ECS task definition
        id: task-def
        run: |
          TASK_DEF_ARN=$(aws ecs register-task-definition --cli-input-json file://task-def.json --query 'taskDefinition.taskDefinitionArn' --output text)
          echo "task_def_arn=$TASK_DEF_ARN" >> $GITHUB_OUTPUT

      - name: Create or update ECS service
        env:
          TASK_DEF_ARN: ${{ steps.task-def.outputs.task_def_arn }}
        run: |
          SERVICE_EXISTS=$(aws ecs describe-services --cluster $ECS_CLUSTER --services $ECS_SERVICE --query 'services[?status==`ACTIVE`].serviceName' --output text 2>/dev/null || true)
          if [ -z "$SERVICE_EXISTS" ]; then
            echo "Creating new ECS service..."
            aws ecs create-service \
              --cluster $ECS_CLUSTER \
              --service-name $ECS_SERVICE \
              --task-definition $TASK_DEF_ARN \
              --desired-count 1 \
              --launch-type FARGATE \
              --network-configuration "awsvpcConfiguration={subnets=[subnet-06b263d3ff15bc126,subnet-0b34236379abe1b57,subnet-0620259e81b20cf7f],securityGroups=[sg-0c423b3225f0c9479],assignPublicIp=ENABLED}" \
              --load-balancers "targetGroupArn=arn:aws:elasticloadbalancing:us-west-2:146361001621:targetgroup/ignite-tg/1b54a22da9086ffb,containerName=ignite-server,containerPort=8080"
          else
            echo "Updating existing ECS service..."
            aws ecs update-service \
              --cluster $ECS_CLUSTER \
              --service $ECS_SERVICE \
              --task-definition $TASK_DEF_ARN \
              --force-new-deployment
          fi

      - name: Wait for service stability
        run: |
          echo "Waiting for ECS service to stabilize..."
          aws ecs wait services-stable --cluster $ECS_CLUSTER --services $ECS_SERVICE

      - name: Verify deployed revision
        env:
          EXPECTED_IMAGE_DIGEST: ${{ steps.build-image.outputs.image_digest }}
          EXPECTED_GIT_SHA: ${{ steps.build-image.outputs.image_tag }}
        run: |
          chmod +x deploy/verify_ecs_deployment.sh
          AWS_REGION="$AWS_REGION" \
          ECS_CLUSTER="$ECS_CLUSTER" \
          ECS_SERVICE="$ECS_SERVICE" \
          CONTAINER_NAME="$CONTAINER_NAME" \
          EXPECTED_IMAGE_DIGEST="$EXPECTED_IMAGE_DIGEST" \
          EXPECTED_GIT_SHA="$EXPECTED_GIT_SHA" \
          PUBLIC_BASE_URL="$PUBLIC_BASE_URL" \
          ./deploy/verify_ecs_deployment.sh
